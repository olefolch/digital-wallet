services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  auth-service:
    build:
      context: ./src/services/AuthService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AuthDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "digital-wallet"
      Jwt__Audience: "digital-wallet"
      Jwt__ExpirationHours: "8"
    depends_on:
      - sqlserver

  account-service:
    build:
      context: ./src/services/AccountService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AccountDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
    depends_on:
      - sqlserver